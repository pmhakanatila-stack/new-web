<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>İçerik detayı — PEYZAJDER</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="content-detail.css?v=20260723-fit"><link rel="stylesheet" href="content-gallery.css?v=20260723-lightbox2"><script src="config.js"></script><link rel="stylesheet" href="site-runtime.css?v=20260715"><script src="site-runtime.js?v=20260715" defer></script></head>
<body class="detail-body"><header class="detail-header"><a class="detail-brand" href="index.html"><img src="assets/peyzajder-logo.png" alt="PEYZAJDER"><span>Peyzaj Mimarları ve Sektör Profesyonelleri Derneği</span></a><nav><a href="index.html">Ana sayfa</a><a href="news.html">Haberler</a><a href="events.html">Etkinlikler</a><a href="notices.html">Duyurular</a><a class="detail-member" href="member-login.html">Üye girişi</a></nav></header><main id="detailRoot" class="detail-shell" aria-live="polite"><p class="detail-loading">İçerik yükleniyor…</p></main><footer class="detail-footer"><b>PEYZAJDER</b><span>Bilgi, mesleki dayanışma ve sürdürülebilir peyzaj için.</span><a href="contact.html">Bize ulaşın →</a></footer>
<script>
const apiPath=path=>window.peyzajderApiPath?window.peyzajderApiPath(path):String(path||'');
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const clean=s=>String(s||'').replace(/var\s+\w+\s*;?/gi,' ').replace(/google-site-verification=[^\s]+/gi,' ').replace(/Çağrı Merkezi\s*\d[\d\s]+/gi,' ').replace(/YÖNETİM Başkanın Mesajları/gi,' ').replace(/DERNEK ve ÜYELER Hakkımızda Banka Hesap Numaralarımız/gi,' ').replace(/Adres\s*:\s*Alaaddinbey Mah\.[\s\S]*?Bursa/gi,' ').replace(/E-Posta\s*:\s*bilgi@peyzajder\.org/gi,' ').replace(/Güncel haberler, duyurular ve ihalelerden anında haberdar ol/gi,' ').replace(/Bu internet sitesinde sizlere daha iyi hizmet sunulabilmesi için çerezler kullanılmaktadır\.?/gi,' ').replace(/\s+/g,' ').trim();
const id=new URLSearchParams(location.search).get('id')||'',root=document.querySelector('#detailRoot');
const categoryPage=x=>x==='haberler'?'news.html':x==='etkinlikler'?'events.html':x==='duyurular'?'notices.html':'archive.html';
const categoryName=x=>x==='haberler'?'Haber':x==='etkinlikler'?'Etkinlik':x==='duyurular'?'Duyuru':'PEYZAJDER';
const paragraphs=text=>String(text||'').split(/\n{2,}|\r\n/).map(clean).filter(Boolean);
const richBody=text=>/<\/?(?:p|h2|h3|strong|b|em|i|u|ul|ol|li|blockquote|a|br|figure|figcaption|img)\b/i.test(String(text||''))?String(text||''):paragraphs(text).map((p,i)=>i===0?`<p class="lead">${esc(p)}</p>`:`<p>${esc(p)}</p>`).join('');
Promise.all([fetch(`${apiPath('/api/public/item')}?id=${encodeURIComponent(id)}`,{cache:'no-store'}).then(async r=>{const d=await r.json();if(!r.ok)throw new Error(d.error);return d}),fetch(apiPath('/api/public/archive'),{cache:'no-store'}).then(r=>r.json()).catch(()=>({items:[]}))]).then(([item,archive])=>{
  if(/^https?:\/\/(?:www\.)?peyzajder\.org(?:[/?#]|$)/i.test(String(item.sourceUrl||'').trim()))item.sourceUrl='';
  const label=categoryName(item.category),back=categoryPage(item.category),parts=paragraphs(item.body||item.summary),date=item.date?new Date(item.date).toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'}):'';
  const related=(archive.items||[]).filter(x=>x.category===item.category&&x.id!==item.id).slice(0,4);
  document.title=`${item.title||label} — PEYZAJDER`;
  const gallery=(item.images||[]).filter(src=>src&&src!==item.image);
  root.innerHTML=`<div class="detail-breadcrumb"><a href="index.html">Ana sayfa</a><span>→</span><a href="${back}">${label}</a></div><section class="detail-heading"><div><p class="detail-kicker">${esc(label)} · PEYZAJDER</p><h1>${esc(item.title)}</h1><div class="detail-meta"><span>${esc(date||'Güncel içerik')}</span><span>PEYZAJDER Yayın Kurulu</span></div></div></section>${item.image?`<figure class="detail-cover"><img src="${esc(item.image)}" alt="${esc(item.title)}"></figure>`:''}<div class="detail-layout"><article class="detail-content">${parts.length?parts.map((p,i)=>i===0?`<p class="lead">${esc(p)}</p>`:`<p>${esc(p)}</p>`).join(''):`<p class="lead">${esc(clean(item.summary)||'Bu içerik için detay metni hazırlanıyor.')}</p>`}${item.sourceUrl?`<a class="source-link" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener">Kaynak bağlantıyı aç ↗</a>`:''}</article><aside class="detail-aside"><p class="detail-kicker">PEYZAJDER GÜNDEMİ</p><h2>İlgili içerikler</h2>${related.map(x=>`<a href="content-detail.html?id=${encodeURIComponent(x.id)}"><small>${esc(categoryName(x.category))}</small><b>${esc(x.title)}</b><span>Oku →</span></a>`).join('')||'<p>Bu kategoride başka içerik bulunmuyor.</p>'}<a class="all-link" href="${back}">Tüm ${label.toLocaleLowerCase('tr-TR')} içerikleri →</a></aside></div>${gallery.length?`<section class="detail-gallery" aria-label="İçerik fotoğrafları"><p class="detail-kicker">FOTOĞRAFLAR</p><h2>${label==='Etkinlik'?'Etkinlikten kareler':'İçerik galerisi'}</h2><div>${gallery.map((src,index)=>`<button type="button" class="gallery-thumb" data-lightbox="${esc(src)}"><img src="${esc(src)}" alt="${esc(item.title)} — ${index+1}. fotoğraf" loading="lazy"></button>`).join('')}</div></section>`:''}`;
  const article=root.querySelector('.detail-content');if(article)article.innerHTML=`${richBody(item.body||item.summary)}${item.sourceUrl?`<a class="source-link" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener">Kaynak bağlantıyı aç ↗</a>`:''}`;
  root.querySelectorAll('.gallery-thumb').forEach(btn=>btn.addEventListener('click',()=>openLightbox(btn.dataset.lightbox,btn.querySelector('img').alt)));
  root.querySelectorAll('.article-inline-image img').forEach(img=>img.addEventListener('click',()=>openLightbox(img.currentSrc||img.src,img.alt)));
}).catch(()=>{root.innerHTML='<section class="detail-error"><h1>İçerik bulunamadı</h1><p>Bu kayıt kaldırılmış veya yayından alınmış olabilir.</p><a href="index.html">Ana sayfaya dön →</a></section>'});
let lightboxEl=null;
function openLightbox(src,alt){
  if(!lightboxEl){
    lightboxEl=document.createElement('div');
    lightboxEl.className='content-lightbox';
    lightboxEl.innerHTML='<button type="button" class="content-lightbox-close" aria-label="Kapat">×</button><img alt="">';
    document.body.appendChild(lightboxEl);
    lightboxEl.addEventListener('click',e=>{if(e.target===lightboxEl||e.target.classList.contains('content-lightbox-close'))closeLightbox()});
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});
  }
  lightboxEl.querySelector('img').src=src;
  lightboxEl.querySelector('img').alt=alt||'';
  lightboxEl.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  if(lightboxEl){lightboxEl.classList.remove('open');document.body.style.overflow=''}
}
</script></body></html>
